# Pipeline de release: PostgreSQL efêmero + alembic + pytest; ao publicar tag, cria GitHub Release.
# Disparo em push de qualquer tag sem "/" (ex.: 0.1.0, v1.0.0). GitHub usa glob, não regex.
# Também: Actions → Release → Run workflow (workflow_dispatch).
name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify (migrations + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taskflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/taskflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
